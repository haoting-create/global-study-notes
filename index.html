<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
background:#f8f3e8;
color:#3b3028;
}

/* ===== Banner ===== */

.hero{
max-width:1400px;
margin:auto;
}

.hero img{
width:100%;
display:block;
}

/* ===== 內容 ===== */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.section-title{
font-size:30px;
color:#2f5d50;
margin:25px 0;
}

/* ===== 書卡 ===== */

.book-card{

background:white;

border-radius:24px;

padding:30px;

display:grid;

grid-template-columns:220px 1fr;

gap:30px;

align-items:center;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

/* 左側 */

.book-cover{

display:flex;

justify-content:center;

align-items:center;

}

.book-cover img{

width:170px;

border-radius:16px;

box-shadow:0 10px 25px rgba(0,0,0,.18);

transition:.35s;

}

.book-cover img:hover{

transform:translateY(-5px) scale(1.03);

}

/* 右側 */

.book-info h2{

margin:0;

font-size:42px;

color:#2f5d50;

}

.book-info p{

font-size:20px;

line-height:1.8;

margin:18px 0;

}

/* tag */

.tags{

margin-top:18px;

}

.tags span{

display:inline-block;

background:#e7efe3;

padding:9px 16px;

border-radius:999px;

margin:6px;

font-weight:bold;

color:#2f5d50;

}

/* button */

.button{

display:inline-block;

margin-top:25px;

background:#2f5d50;

color:white;

padding:15px 34px;

border-radius:999px;

text-decoration:none;

font-size:18px;

font-weight:bold;

transition:.3s;

}

.button:hover{

background:#3f7564;

transform:translateY(-2px);

}

/* future */

.future-grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:25px;

}

.future-card{

background:white;

border-radius:20px;

padding:40px 20px;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,.06);

}

.future-card h3{

color:#2f5d50;

font-size:28px;

margin-bottom:10px;

}

/* footer */

footer{

padding:35px;

text-align:center;

color:#777;

}

/* 手機 */

@media(max-width:768px){

.book-card{

grid-template-columns:1fr;

text-align:center;

}

.book-info h2{

font-size:32px;

}

.future-grid{

grid-template-columns:1fr;

}

}

</style>
