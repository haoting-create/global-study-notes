<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>第001冊｜2026/07/05 全球網路共修圖解筆記</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
  background:#f7f3ea;
  color:#3b3028;
}
header{
  background:linear-gradient(135deg,#2f5d50,#7fa37b);
  color:white;
  text-align:center;
  padding:36px 18px;
}
header h1{margin:0;font-size:30px}
header p{font-size:17px;line-height:1.7}
nav{
  position:sticky;
  top:0;
  background:#fffdf8;
  border-bottom:1px solid #ddd2c3;
  padding:10px;
  text-align:center;
  z-index:10;
}
nav button{
  margin:4px;
  padding:8px 13px;
  border:0;
  border-radius:999px;
  background:#e7efe3;
  color:#2f5d50;
  font-weight:bold;
  cursor:pointer;
}
nav button.active{background:#2f5d50;color:white}
main{max-width:980px;margin:0 auto;padding:22px 12px}
.page{display:none}
.page.active{display:block}
.comic{
  width:100%;
  max-width:900px;
  display:block;
  margin:0 auto;
  border-radius:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.12);
  background:white;
}
.controls{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin:24px auto 10px;
  max-width:900px;
}
.controls button,.home{
  padding:13px 24px;
  border:0;
  border-radius:999px;
  background:#2f5d50;
  color:white;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
}
.controls button:disabled{background:#c8c8c8}
footer{text-align:center;padding:28px;color:#777}
@media(max-width:700px){
  header h1{font-size:23px}
  header p{font-size:15px}
  nav{overflow-x:auto;white-space:nowrap}
  .controls{flex-direction:column}
  .controls button,.home{text-align:center;width:100%}
}
</style>
</head>

<body>

<header>
  <h1>📖 第001冊｜2026/07/05 全球網路共修圖解筆記</h1>
  <p>主題：反求諸己・天地不會錯・時間可以證明</p>
</header>

<nav id="nav"></nav>

<main>

<section class="page active">
  <img class="comic" src="../images/2026-07-05/01-封面.png" alt="封面">
</section>

<section class="page">
  <img class="comic" src="../images/2026-07-05/02-釣魚人與狗.png" alt="釣魚人與狗">
</section>

<section class="page">
  <img class="comic" src="../images/2026-07-05/03-反求諸己.png" alt="反求諸己">
</section>

<section class="page">
  <img class="comic" src="../images/2026-07-05/04-時間可以證明.png" alt="時間可以證明">
</section>

<section class="page">
  <img class="comic" src="../images/2026-07-05/05-順境更要守住初心.png" alt="順境更要守住初心">
</section>

<div class="controls">
  <button id="prevBtn" onclick="prevPage()">← 上一頁</button>
  <a class="home" href="../index.html">回首頁</a>
  <button id="nextBtn" onclick="nextPage()">下一頁 →</button>
</div>

</main>

<footer>
全球網路共修圖解圖書館｜第001冊
</footer>

<script>
const pages = document.querySelectorAll('.page');
const nav = document.getElementById('nav');
let current = 0;

const labels = ['封面','釣魚人與狗','反求諸己','時間可以證明','順境守初心'];

pages.forEach((page, i) => {
  const btn = document.createElement('button');
  btn.textContent = labels[i] || 'Page ' + (i+1);
  btn.onclick = () => showPage(i);
  nav.appendChild(btn);
});

function showPage(i){
  pages[current].classList.remove('active');
  nav.children[current].classList.remove('active');
  current = i;
  pages[current].classList.add('active');
  nav.children[current].classList.add('active');
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === pages.length - 1;
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextPage(){
  if(current < pages.length - 1) showPage(current + 1);
}

function prevPage(){
  if(current > 0) showPage(current - 1);
}

showPage(0);
</script>

</body>
</html>
